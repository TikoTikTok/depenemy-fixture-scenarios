name: Supply Chain Security — Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "fixtures/**/package.json"
      - "fixtures/**/package-lock.json"
      - ".github/workflows/integration-tests.yml"

permissions:
  contents: read
  security-events: write   # required for SARIF upload to Code Scanning

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Unit tests: depenemy rules against mock metadata (no network)
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Depenemy Rule Tests (mock metadata)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depenemy + test deps
        run: |
          pip install git+https://github.com/TikoTikTok/depenemy.git@feat/github-action-docker pytest

      - name: Run depenemy rule integration tests
        run: |
          pytest tests/test_depenemy_rules.py -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Scan clean fixtures using the depenemy action — expect: PASS
  # Mirrors exactly what a client would put in their .github/workflows/
  # ────────────────────────────────────────────────────────────────────────────
  scan-clean:
    name: "Supply Chain Scan — Clean Fixtures (expect: pass)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run depenemy
        id: scan
        uses: TikoTikTok/depenemy@feat/github-action-docker
        with:
          paths: fixtures/clean
          approved-registries: "registry.npmjs.org"
          fail-on: error
          upload-sarif: "false"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on this repo
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-file }}
          category: depenemy-clean

      - name: Summarise findings
        if: always()
        run: |
          echo "### 🟢 Clean Fixtures Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total findings | ${{ steps.scan.outputs.findings-count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error findings | ${{ steps.scan.outputs.errors-count }} |" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # Scan attack fixtures using the depenemy action — expect: FAIL
  # continue-on-error: true so the overall workflow still completes
  # ────────────────────────────────────────────────────────────────────────────
  scan-attack:
    name: "Supply Chain Scan — Attack Fixtures (expect: fail)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run depenemy
        id: scan
        uses: TikoTikTok/depenemy@feat/github-action-docker
        with:
          paths: fixtures/real-attack-simulation
          approved-registries: "registry.npmjs.org"
          fail-on: error
          upload-sarif: "false"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on this repo
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-file }}
          category: depenemy-attack

      - name: Summarise findings
        if: always()
        run: |
          echo "### 🔴 Attack Fixtures Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total findings | ${{ steps.scan.outputs.findings-count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error findings | ${{ steps.scan.outputs.errors-count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ℹ️ This job is **expected** to detect findings. \`continue-on-error: true\` is set." >> "$GITHUB_STEP_SUMMARY"
